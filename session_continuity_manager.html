
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, system-ui); background: transparent; color: var(--color-text-primary); font-size: 14px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1rem 1.25rem; }
.card-sm { background: var(--color-background-secondary); border-radius: 8px; padding: 0.75rem 1rem; }
input, textarea, select { font-family: var(--font-sans, system-ui); font-size: 13px; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 7px 10px; width: 100%; outline: none; resize: none; }
input:focus, textarea:focus { border-color: var(--color-border-primary); }
button { font-family: var(--font-sans, system-ui); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); padding: 7px 14px; transition: background 0.15s; }
button:hover { background: var(--color-background-secondary); }
button.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
button.primary:hover { opacity: 0.85; }
button.danger { color: var(--color-text-danger); border-color: var(--color-border-danger); }
button.danger:hover { background: var(--color-background-danger); }
button.ghost { border-color: transparent; color: var(--color-text-secondary); padding: 4px 8px; font-size: 12px; }
button.ghost:hover { color: var(--color-text-primary); background: var(--color-background-secondary); }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
.label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.section-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.row { display: flex; align-items: center; gap: 8px; }
.editable-field { cursor: pointer; padding: 6px 8px; border-radius: 6px; color: var(--color-text-primary); line-height: 1.6; }
.editable-field:hover { background: var(--color-background-secondary); }
.editable-field.empty { color: var(--color-text-secondary); font-style: italic; }
.task-row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.task-row:last-child { border-bottom: none; }
.task-check { width: 16px; height: 16px; border: 1.5px solid var(--color-border-secondary); border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.task-check.done { background: var(--color-text-primary); border-color: transparent; }
.task-text { flex: 1; line-height: 1.5; color: var(--color-text-primary); font-size: 13px; }
.task-text.done { text-decoration: line-through; color: var(--color-text-secondary); }
.session-entry { padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.session-entry:last-child { border-bottom: none; }
.toast { position: fixed; bottom: 16px; right: 16px; background: var(--color-text-primary); color: var(--color-background-primary); padding: 8px 14px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99; }
.toast.show { opacity: 1; }
.divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1rem 0; }
.mono { font-family: var(--font-mono, monospace); }
.archived-card { background: var(--color-background-secondary); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 8px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--color-border-secondary); border-top-color: var(--color-text-primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
select { appearance: none; -webkit-appearance: none; cursor: pointer; }
</style>
</head>
<body>

<div id="app" style="padding: 0.5rem 0; max-width: 660px; margin: 0 auto;"></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "sunni-continuity-v1";
let STATE = { active: null, completed: [] };
let VIEW = "main";
let AI_WORKING = false;
let EDITING = null;
let EDIT_VAL = "";
let NOTE_INPUT = "";
let NEW_TASK = "";
let NEW_PROJ = { name: "", objective: "" };
let CONFIRM_ARCHIVE = false;
let SHOW_LOG = false;
let SHOW_ARCHIVE = false;

const STATUSES = [
  { value: "in-progress", label: "In progress", textColor: "var(--color-text-success)", bgColor: "var(--color-background-success)" },
  { value: "blocked", label: "Blocked", textColor: "var(--color-text-warning)", bgColor: "var(--color-background-warning)" },
  { value: "pending-review", label: "Pending review", textColor: "var(--color-text-info)", bgColor: "var(--color-background-info)" },
  { value: "wrapping-up", label: "Wrapping up", textColor: "var(--color-text-secondary)", bgColor: "var(--color-background-tertiary)" },
];

function today() { return new Date().toISOString().split("T")[0]; }

async function persist(next) {
  STATE = next;
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(next)); }
  catch(e) { flash("Storage error: " + e.message); }
  render();
}

function flash(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

async function init() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    STATE = r ? JSON.parse(r.value) : { active: null, completed: [] };
  } catch { STATE = { active: null, completed: [] }; }
  render();
}

function startSession() {
  const p = STATE.active;
  if (!p) return;
  const open = p.tasks.filter(t => !t.done);
  const last = p.sessionLog && p.sessionLog[0];
  const lines = [
    `Session context — ${new Date().toLocaleDateString()}`,
    ``,
    `Project: ${p.name}`,
    `Status: ${p.status} | Started: ${p.started}`,
    ``,
    `Objective: ${p.objective || "Not set"}`,
    ``,
    `Current state: ${p.currentState || "Not recorded"}`,
    ``,
    open.length ? `Open tasks:\n${open.map(t => "• " + t.text).join("\n")}` : "No open tasks.",
    ``,
    last ? `Last session (${last.date}):\n${last.notes}` : "First session on this project.",
    ``,
    `Ready — what are we working on today?`
  ];
  window.sendPrompt(lines.join("\n"));
  flash("Context injected into chat ↗");
}

async function saveNotes() {
  if (!NOTE_INPUT.trim()) return;
  const entry = { date: today(), notes: NOTE_INPUT.trim() };
  const updated = { ...STATE, active: { ...STATE.active, sessionLog: [entry, ...(STATE.active.sessionLog || [])] }};
  NOTE_INPUT = "";
  VIEW = "main";
  await persist(updated);
  flash("Session notes saved");
}

async function addTask() {
  if (!NEW_TASK.trim()) return;
  const task = { id: Date.now().toString(), text: NEW_TASK.trim(), done: false };
  const updated = { ...STATE, active: { ...STATE.active, tasks: [...(STATE.active.tasks || []), task] }};
  NEW_TASK = "";
  await persist(updated);
}

async function toggleTask(id) {
  const updated = { ...STATE, active: { ...STATE.active, tasks: STATE.active.tasks.map(t => t.id === id ? {...t, done: !t.done} : t) }};
  await persist(updated);
}

async function removeTask(id) {
  const updated = { ...STATE, active: { ...STATE.active, tasks: STATE.active.tasks.filter(t => t.id !== id) }};
  await persist(updated);
}

async function saveField(field) {
  const updated = { ...STATE, active: { ...STATE.active, [field]: EDIT_VAL }};
  EDITING = null;
  EDIT_VAL = "";
  await persist(updated);
  flash("Saved");
}

async function updateStatus(val) {
  const updated = { ...STATE, active: { ...STATE.active, status: val }};
  await persist(updated);
}

async function createProject() {
  if (!NEW_PROJ.name.trim()) { flash("Project name required"); return; }
  const proj = {
    id: Date.now().toString(),
    name: NEW_PROJ.name.trim(),
    started: today(),
    status: "in-progress",
    objective: NEW_PROJ.objective.trim(),
    currentState: "Session 1 — starting fresh.",
    tasks: [],
    sessionLog: [],
  };
  NEW_PROJ = { name: "", objective: "" };
  VIEW = "main";
  await persist({ ...STATE, active: proj });
  flash("Project started");
}

async function archiveProject() {
  const p = STATE.active;
  AI_WORKING = true;
  CONFIRM_ARCHIVE = false;
  render();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content:
`Write a 2-4 sentence archive summary for a completed project. Dense, factual, no fluff, no bullets, no preamble — just the summary.

Project: "${p.name}"
Objective: ${p.objective || "not recorded"}
Current state at close: ${p.currentState || "not recorded"}
Sessions: ${(p.sessionLog||[]).length}
Completed tasks: ${(p.tasks||[]).filter(t=>t.done).map(t=>t.text).join("; ")||"none"}
Open at close: ${(p.tasks||[]).filter(t=>!t.done).map(t=>t.text).join("; ")||"none"}`
        }]
      })
    });
    const json = await res.json();
    const summary = json.content?.find(b => b.type === "text")?.text || "Project completed.";
    const archived = { ...p, closedDate: today(), summary };
    const next = { active: null, completed: [archived, ...(STATE.completed||[])] };
    AI_WORKING = false;
    VIEW = "main";
    SHOW_ARCHIVE = true;
    await persist(next);
    flash(`"${p.name}" archived`);
    window.sendPrompt(`Project "${p.name}" has been archived. Continuity log is cleared — what's the next project?`);
  } catch(e) {
    AI_WORKING = false;
    flash("Archive failed: " + e.message);
    render();
  }
}

function statusBadge(val) {
  const s = STATUSES.find(x => x.value === val) || STATUSES[0];
  return `<span class="badge" style="background:${s.bgColor};color:${s.textColor}">${s.label}</span>`;
}

function checkSvg() {
  return `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="var(--color-background-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function trashSvg() {
  return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M5 5v4M7 5v4M3 3l.5 6h5L9 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function render() {
  const app = document.getElementById("app");

  if (AI_WORKING) {
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:2.5rem;">
        <div style="display:inline-flex;align-items:center;gap:10px;color:var(--color-text-secondary)">
          <div class="spinner"></div>
          <span>Writing archive summary…</span>
        </div>
      </div>`;
    return;
  }

  if (VIEW === "new") {
    app.innerHTML = `
      <div class="card">
        <div class="row" style="margin-bottom:1.25rem">
          <button class="ghost" onclick="VIEW='main';render()">← Back</button>
          <span style="font-size:13px;font-weight:500">New project</span>
        </div>
        <div style="margin-bottom:12px">
          <div class="label">Project name</div>
          <input id="np-name" placeholder="e.g. SediMemory integration" value="${escHtml(NEW_PROJ.name)}" oninput="NEW_PROJ.name=this.value" onkeydown="if(event.key==='Enter')document.getElementById('np-obj').focus()">
        </div>
        <div style="margin-bottom:16px">
          <div class="label">Objective <span style="color:var(--color-text-secondary);font-size:11px">(optional)</span></div>
          <textarea id="np-obj" rows="3" placeholder="What are we building and why?" oninput="NEW_PROJ.objective=this.value">${escHtml(NEW_PROJ.objective)}</textarea>
        </div>
        <div class="row" style="justify-content:flex-end">
          <button onclick="VIEW='main';render()">Cancel</button>
          <button class="primary" onclick="createProject()">Start project</button>
        </div>
      </div>`;
    document.getElementById("np-name")?.focus();
    return;
  }

  if (VIEW === "log-notes") {
    app.innerHTML = `
      <div class="card">
        <div class="row" style="margin-bottom:1.25rem">
          <button class="ghost" onclick="VIEW='main';render()">← Back</button>
          <span style="font-size:13px;font-weight:500">Log session notes</span>
        </div>
        <div style="margin-bottom:4px;color:var(--color-text-secondary);font-size:12px">${today()}</div>
        <textarea rows="6" placeholder="What did we do this session? Decisions made, what changed, what's next…" oninput="NOTE_INPUT=this.value" style="margin-bottom:12px">${escHtml(NOTE_INPUT)}</textarea>
        <div class="row" style="justify-content:flex-end">
          <button onclick="VIEW='main';NOTE_INPUT='';render()">Cancel</button>
          <button class="primary" onclick="saveNotes()">Save notes</button>
        </div>
      </div>`;
    document.querySelector("textarea")?.focus();
    return;
  }

  const p = STATE.active;
  const completed = STATE.completed || [];

  if (!p) {
    const archiveHtml = completed.length ? `
      <div style="margin-top:1.5rem">
        <button class="ghost" onclick="SHOW_ARCHIVE=!SHOW_ARCHIVE;render()" style="margin-bottom:8px">
          ${SHOW_ARCHIVE ? "▾" : "▸"} Completed projects (${completed.length})
        </button>
        ${SHOW_ARCHIVE ? completed.map(c => `
          <div class="archived-card">
            <div class="row" style="margin-bottom:4px">
              <span style="font-weight:500;font-size:13px">${escHtml(c.name)}</span>
              <span style="font-size:11px;color:var(--color-text-secondary);margin-left:auto">${c.started} – ${c.closedDate||"?"}</span>
            </div>
            <p style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">${escHtml(c.summary||"")}</p>
          </div>`).join("") : ""}
      </div>` : "";

    app.innerHTML = `
      <div style="text-align:center;padding:2.5rem 1rem">
        <div style="font-size:32px;margin-bottom:8px">○</div>
        <p style="font-weight:500;margin-bottom:4px">No active project</p>
        <p style="color:var(--color-text-secondary);font-size:13px;margin-bottom:1.5rem">Start a project to begin tracking sessions</p>
        <button class="primary" onclick="VIEW='new';render()">+ New project</button>
      </div>
      ${archiveHtml}`;
    return;
  }

  const openTasks = (p.tasks||[]).filter(t => !t.done);
  const doneTasks = (p.tasks||[]).filter(t => t.done);
  const log = p.sessionLog||[];

  const editableField = (field, placeholder, multiline) => {
    if (EDITING === field) {
      const tag = multiline ? "textarea" : "input";
      return `<${tag} id="edit-field" ${multiline ? 'rows="4"' : ''} oninput="EDIT_VAL=this.value" onkeydown="if(event.key==='Escape'){EDITING=null;render();}">${multiline ? escHtml(EDIT_VAL) : ''}</${tag}>
        ${multiline ? '' : ''}
        <div class="row" style="margin-top:6px;justify-content:flex-end">
          <button class="ghost" onclick="EDITING=null;render()">Cancel</button>
          <button class="primary" onclick="saveField('${field}')">Save</button>
        </div>`;
    }
    const val = p[field];
    return `<div class="editable-field ${val ? '' : 'empty'}" onclick="EDITING='${field}';EDIT_VAL=${JSON.stringify(val||'')};render()" title="Click to edit">${val ? escHtml(val) : placeholder}</div>`;
  };

  const tasksHtml = () => {
    const rows = (p.tasks||[]).map(t => `
      <div class="task-row">
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask('${t.id}')">${t.done ? checkSvg() : ''}</div>
        <span class="task-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</span>
        <button class="ghost" style="padding:2px 4px;color:var(--color-text-secondary)" onclick="removeTask('${t.id}')">${trashSvg()}</button>
      </div>`).join("");
    return `${rows}
      <div class="row" style="margin-top:8px">
        <input placeholder="Add a task…" id="task-input" value="${escHtml(NEW_TASK)}" oninput="NEW_TASK=this.value" onkeydown="if(event.key==='Enter')addTask()" style="font-size:12px">
        <button onclick="addTask()" style="white-space:nowrap;font-size:12px">Add</button>
      </div>`;
  };

  const logHtml = () => {
    if (!log.length) return `<span style="color:var(--color-text-secondary);font-size:12px;font-style:italic">No sessions logged yet</span>`;
    const shown = SHOW_LOG ? log : log.slice(0, 2);
    return shown.map(e => `
      <div class="session-entry">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;font-family:var(--font-mono)">${e.date}</div>
        <div style="font-size:13px;color:var(--color-text-primary);white-space:pre-wrap;line-height:1.6">${escHtml(e.notes)}</div>
      </div>`).join("") + (log.length > 2 ? `
      <button class="ghost" onclick="SHOW_LOG=!SHOW_LOG;render()" style="margin-top:6px">
        ${SHOW_LOG ? "Show less" : `Show ${log.length - 2} more`}
      </button>` : "");
  };

  const confirmHtml = CONFIRM_ARCHIVE ? `
    <div class="card" style="border-color:var(--color-border-warning);margin-bottom:1rem">
      <p style="font-size:13px;margin-bottom:12px">Archive <strong>${escHtml(p.name)}</strong>? AI will write a summary. This clears the active log.</p>
      <div class="row">
        <button onclick="CONFIRM_ARCHIVE=false;render()">Cancel</button>
        <button class="danger" onclick="archiveProject()">Archive project</button>
      </div>
    </div>` : "";

  const archiveHtml = completed.length ? `
    <div style="margin-top:1rem">
      <button class="ghost" onclick="SHOW_ARCHIVE=!SHOW_ARCHIVE;render()">
        ${SHOW_ARCHIVE ? "▾" : "▸"} Completed projects (${completed.length})
      </button>
      ${SHOW_ARCHIVE ? completed.map(c => `
        <div class="archived-card" style="margin-top:6px">
          <div class="row" style="margin-bottom:4px">
            <span style="font-weight:500;font-size:13px">${escHtml(c.name)}</span>
            <span style="font-size:11px;color:var(--color-text-secondary);margin-left:auto">${c.started} – ${c.closedDate||"?"}</span>
          </div>
          <p style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">${escHtml(c.summary||"")}</p>
        </div>`).join("") : ""}
    </div>` : "";

  app.innerHTML = `
    ${confirmHtml}
    <div class="card" style="margin-bottom:1rem">
      <div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <span style="font-size:17px;font-weight:500;flex:1;min-width:0">${escHtml(p.name)}</span>
        <select onchange="updateStatus(this.value)" style="width:auto;font-size:12px">
          ${STATUSES.map(s => `<option value="${s.value}" ${p.status===s.value?'selected':''}>${s.label}</option>`).join("")}
        </select>
      </div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:1rem;font-family:var(--font-mono)">
        Started ${p.started} · ${openTasks.length} open task${openTasks.length!==1?'s':''} · ${log.length} session${log.length!==1?'s':''}
      </div>
      <div class="row" style="flex-wrap:wrap;gap:6px">
        <button class="primary" onclick="startSession()">▶ Start session ↗</button>
        <button onclick="VIEW='log-notes';render()">✎ Log notes</button>
        <button class="danger" onclick="CONFIRM_ARCHIVE=true;render()">Archive project</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:8px">
      <div class="section-title">Objective</div>
      ${editableField("objective", "Click to set objective…", true)}
    </div>

    <div class="card" style="margin-bottom:8px">
      <div class="section-title">Current state</div>
      ${editableField("currentState", "Click to describe current state…", true)}
    </div>

    <div class="card" style="margin-bottom:8px">
      <div class="section-title">Tasks${doneTasks.length ? ` · ${doneTasks.length} done` : ''}</div>
      ${tasksHtml()}
    </div>

    <div class="card" style="margin-bottom:8px">
      <div class="section-title">Session log</div>
      ${logHtml()}
    </div>

    ${archiveHtml}`;

  if (EDITING) {
    const el = document.getElementById("edit-field");
    if (el) { el.focus(); el.setSelectionRange && el.setSelectionRange(EDIT_VAL.length, EDIT_VAL.length); }
  }
}

function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

init();
</script>
</body>
</html>
