name: Python CI

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '*.py'
      - 'aurora_internal/**'
      - 'tests/**'
      - 'requirements-core.txt'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - '*.py'
      - 'aurora_internal/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt

      - name: Syntax check (py_compile all modules)
        run: |
          python -m py_compile aurora.py foundational_contract.py
          # Compile every top-level and internal module; fail on any syntax error.
          find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 python -m py_compile

      - name: Architectural guard (L0-L8 acyclic layering)
        run: python tests/test_layer_acyclicity.py

      - name: Import smoke test
        env:
          AURORA_SKIP_DEP_INSTALL: '1'
        run: |
          python - <<'PY'
          import aurora
          import aurora_consciousness_engine
          import aurora_simulation_engine
          import aurora_governance_persistence_gateway
          print('Aurora core imports OK')
          PY
