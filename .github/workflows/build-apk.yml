name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
      options: --user root

    steps:
    - uses: actions/checkout@v4

    - name: Cache Buildozer directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
  
    - name: Find sdkmanager
      run: |
       find "$HOME/.buildozer" -name sdkmanager -type f
 
    - name: Install Android SDK platform 33
      run: |
       export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
       yes | "$ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager" --licenses
       "$ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager" "platforms;android-33" "build-tools;33.0.2"
  
    - name: Build with Buildozer
      run: |
        # The container already has buildozer and all dependencies.
        # We just need to trigger the build.
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aurora-apk
        path: bin/*.apk
