name: Flutter Android Build

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'flutter_app/**'
      - 'aurora_core_ai/**'
      - 'aurora_internal/**'
      - 'aurora_support_stack.py'
      - 'foundational_contract.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK 25
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      # settings.gradle reads local.properties at evaluation time — must exist first
      - name: Write local.properties
        working-directory: flutter_app/android
        run: |
          printf "flutter.sdk=%s\nsdk.dir=%s\nndk.dir=%s\nndk.version=25.1.8937393\n" \
            "$FLUTTER_ROOT" "$ANDROID_SDK_ROOT" "$ANDROID_SDK_ROOT/ndk/25.1.8937393" > local.properties

      - name: Set up signing keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          mkdir -p ~/.android
          if [ -n "$RELEASE_KEYSTORE_B64" ]; then
            # Stable release keystore — same certificate every build, no Play Protect flag
            echo "$RELEASE_KEYSTORE_B64" | base64 -d > ~/.android/release.keystore
          else
            # No secret set yet: generate a debug key (Play Protect will warn until you
            # add RELEASE_KEYSTORE_B64 / RELEASE_STORE_PASS / RELEASE_KEY_ALIAS /
            # RELEASE_KEY_PASS as repository secrets — see SIGNING.md)
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          fi

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Clean Flutter build
        working-directory: flutter_app
        run: flutter clean

      - name: Build APK (release)
        working-directory: flutter_app
        env:
          RELEASE_STORE_PASS: ${{ secrets.RELEASE_STORE_PASS }}
          RELEASE_KEY_ALIAS:  ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASS:   ${{ secrets.RELEASE_KEY_PASS }}
        run: |
          flutter build apk --release --no-shrink -v
          cp build/app/outputs/flutter-apk/app-release.apk ../aurora-release.apk

      - name: List output for verification
        run: ls -lh *.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Aurora Build ${{ github.run_number }}
          files: aurora-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
