plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.chaquo.python"
}

// ── Copy Aurora Python modules into the standard python srcDir ──────────────
task preparePythonSources {
    def repoRoot = file("../../..")
    def destDir  = file("src/main/python")

    inputs.files fileTree(repoRoot) {
        include "aurora_core_ai/**/*.py"
        include "aurora_internal/**/*.py"
        include "*.py"
        exclude "**/__pycache__/**"
        exclude "**/*.pyc"
        exclude "aurora_mobile.py"
    }
    outputs.dir destDir

    doFirst {
        destDir.mkdirs()
    }

    doLast {
        copy {
            from(repoRoot) { include "aurora_core_ai/**/*.py"; exclude "**/__pycache__/**" }
            into destDir
        }
        copy {
            from(repoRoot) { include "aurora_internal/**/*.py"; exclude "**/__pycache__/**" }
            into destDir
        }
        // All root-level runtime modules. Exclude only test/debug/tooling scripts
        // that are never imported by Aurora's boot sequence.
        // aurora_mobile.py is excluded — replaced by aurora_bridge.py on Android.
        copy {
            from(repoRoot) {
                include "*.py"
                exclude "aurora_mobile.py"
                exclude "test_*.py"
                exclude "_*test*.py"
                exclude "debug_*.py"
                exclude "run_*.py"
                exclude "fix_*.py"
                exclude "refactor_*.py"
                exclude "generate_*.py"
                exclude "sentinel*.py"
                exclude "chatscriber.py"
                exclude "crystalzip*.py"
                exclude "clean_*.py"
                exclude "swap_*.py"
                exclude "append_*.py"
                exclude "process_docs.py"
                exclude "force_evolve.py"
                exclude "seed_*.py"
                exclude "termux_*.py"
                exclude "arena_compare.py"
                exclude "corpus_runner.py"
            }
            into destDir
        }
    }
}

preBuild.dependsOn preparePythonSources

tasks.configureEach { task ->
    if (task.name ==~ /merge.*PythonSources/) {
        task.dependsOn preparePythonSources
    }
}

android {
    namespace      "org.aurora.app"
    compileSdkVersion 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = "17" }

    sourceSets {
        main.python.srcDir "src/main/python"
    }

    defaultConfig {
        applicationId "org.aurora.app"
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"

        ndk { abiFilters "arm64-v8a", "x86_64" }
    }

    signingConfigs {
        debug {
            storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

// ── Chaquopy 17.0 DSL (top-level block, not inside android.defaultConfig) ──
chaquopy {
    defaultConfig {
        version "3.12"
        buildPython "python3"
        pip {
            install "requests==2.25.1"
            install "python-dateutil==2.9.0.post0"
            install "pytz==2022.1"
            install "psutil==7.1.3"
            install "numpy==1.26.2"
            install "Pillow"          // used by cv2 Android shim (imwrite/imread)
        }
    }
}

flutter { source "../.." }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.6.2"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
    // CameraX — Aurora visual sensory intake
    implementation "androidx.camera:camera-core:1.3.4"
    implementation "androidx.camera:camera-camera2:1.3.4"
    implementation "androidx.camera:camera-lifecycle:1.3.4"
}
