plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.chaquo.python"
}

// ── Ensure Python directory exists at configuration time ──────────────
File pythonDir = file("src/main/python")
if (!pythonDir.exists()) {
    pythonDir.mkdirs()
}

// ── Copy Aurora Python modules into the standard python srcDir ──────────────
task preparePythonSources {
    def repoRoot = file("../../..")
    def destDir  = file("src/main/python")

    // Gradle 8 strict validation: exclude Flutter/Gradle build output dirs from
    // the input declaration so there is no apparent overlap with the outputs of
    // compileFlutterBuildRelease and buildKotlinToolingMetadata, which also
    // write into the repo root tree.  The Python sources we actually copy never
    // live in those subdirectories, so the exclusion is semantically correct.
    inputs.files fileTree(repoRoot) {
        include "**/*.py"
        include "aurora_manifold_directory/**"
        include "*.py"
        exclude "**/__pycache__/**"
        exclude "**/*.pyc"
        exclude "aurora_mobile.py"
        exclude "flutter_app/**"
        exclude ".dart_tool/**"
        exclude "build/**"
        exclude ".gradle/**"
        exclude ".idea/**"
    }
    outputs.dir destDir

    doFirst {
        destDir.mkdirs()
    }

    doLast {
        // Copy canonical engine from aurora_internal/
        copy {
            from(repoRoot) { include "**/*.py"; exclude "**/__pycache__/**" }
            into destDir
        }
        // Expose aurora_internal at top level so bridge imports work unchanged:
        //   from aurora_internal.X import Y  →  src/main/python/aurora_internal/
        copy {
            from("${repoRoot}/aurora_internal") { include "**/*.py"; exclude "**/__pycache__/**" }
            into "${destDir}/aurora_internal"
        }
        // Manifold directory — King Quasicrystal identity field data + Python package
        copy {
            from(repoRoot) {
                include "aurora_manifold_directory/**"
                exclude "**/__pycache__/**"
            }
            into destDir
        }
        // All root-level runtime modules. Exclude only test/debug/tooling scripts
        // that are never imported by Aurora's boot sequence.
        // aurora_mobile.py is excluded — replaced by aurora_bridge.py on Android.
        copy {
            from(repoRoot) {
                include "*.py"
                exclude "aurora_mobile.py"
                exclude "test_*.py"
                exclude "_*test*.py"
                exclude "debug_*.py"
                exclude "run_*.py"
                exclude "fix_*.py"
                exclude "refactor_*.py"
                exclude "generate_*.py"
                exclude "sentinel*.py"
                exclude "chatscriber.py"
                exclude "crystalzip*.py"
                exclude "clean_*.py"
                exclude "swap_*.py"
                exclude "append_*.py"
                exclude "process_docs.py"
                exclude "force_evolve.py"
                exclude "seed_*.py"
                exclude "termux_*.py"
                exclude "arena_compare.py"
            }
            into destDir
        }
    }
}

preBuild.dependsOn preparePythonSources

tasks.configureEach { task ->
    if (task.name ==~ /merge.*PythonSources/) {
        task.dependsOn preparePythonSources
    }
}

android {
    namespace      "org.aurora.app"
    compileSdkVersion 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = "17" }

    sourceSets {
        main.python.srcDir "src/main/python"
    }

    defaultConfig {
        applicationId "org.aurora.app"
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"

        ndk { abiFilters "arm64-v8a", "x86_64" }

        python {
            version "3.12"
            buildPython "python3"
            pip {
                install "requests==2.25.1"
                install "python-dateutil==2.9.0.post0"
                install "pytz==2022.1"
                install "psutil==7.1.3"
                install "numpy==1.26.2"
                install "Pillow"
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            def ksFile = file(System.getenv("HOME") + "/.android/release.keystore")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword System.getenv("RELEASE_STORE_PASS") ?: ""
                keyAlias     System.getenv("RELEASE_KEY_ALIAS")  ?: ""
                keyPassword  System.getenv("RELEASE_KEY_PASS")   ?: ""
            } else {
                // Fall back to debug key when no release keystore is present
                storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

// ── Disable strict validation on Chaquopy's generated merge tasks ──
tasks.withType(org.gradle.api.tasks.Copy).configureEach { task ->
    if (task.name.contains("mergePython")) {
        task.doFirst {
            // Ensure output directory exists before validation
            task.outputs.files.each { it.mkdirs() }
        }
    }
}

flutter { source "../.." }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.6.2"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
    // CameraX — Aurora visual sensory intake
    implementation "androidx.camera:camera-core:1.3.4"
    implementation "androidx.camera:camera-camera2:1.3.4"
    implementation "androidx.camera:camera-lifecycle:1.3.4"
}
