// No buildscript{} needed — Chaquopy 17.0.0 resolves correctly via the
// declarative plugins{} block in settings.gradle (bug #1289 fixed in 17.0).
allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // flutter.gradle runs on :app AFTER plugin sub-projects are already
    // configured, so flutter.compileSdkVersion is not yet set when
    // speech_to_text (and similar plugins) evaluate their build.gradle.
    // Seed the values here so every project sees them synchronously.
    ext.flutter = [
        compileSdkVersion: 34,
        minSdkVersion    : 26,
        targetSdkVersion : 34,
    ]
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app")
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
